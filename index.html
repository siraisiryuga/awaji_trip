<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awaji Trip Plan</title>

<style>
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f4f6f8;
  line-height:1.6;
}

/* ===== 表紙 ===== */
.hero{
  position:relative;
  height:100vh;
  background:url("cover_awaji.JPG") center center no-repeat;
  background-size:contain;   /* ← 切れない設定 */
  background-color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-align:center;
}

.hero h1{
  font-size:40px;
  background:rgba(0,0,0,0.5);
  padding:20px 40px;
  border-radius:10px;
}

/* ===== セクション ===== */
.section{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.section h2{
  border-bottom:3px solid #ddd;
  padding-bottom:10px;
  margin-bottom:30px;
}

.card{
  background:#fff;
  padding:20px;
  margin-bottom:30px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  border-radius:10px;
  margin-top:15px;
}

/* ===== 料金表 ===== */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

th{
  background:#f0f0f0;
}

.total{
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<!-- 表紙 -->
<div class="hero">
  <h1>淡路島 1泊2日プラン</h1>
</div>

<!-- Day1 -->
<div class="section">
<h2>Day1</h2>

<div class="card">
<h3>淡路夢舞台</h3>
<p>海沿いの絶景建築スポットを散策。</p>
<img src="awaji_yumebutai.JPG">
</div>

<div class="card">
<h3>二次元の森</h3>
<p>アニメ×自然体験。</p>
<img src="nijigen.JPG">
</div>

<div class="card">
<h3>たこせんべいの里</h3>
<p>試食し放題スポット。</p>
<img src="takosenbei.JPG">
</div>

<div class="card">
<h3>居酒屋</h3>
<p>夜は海鮮中心に。</p>
<img src="izakaya.JPG">
</div>

</div>

<!-- Day2 -->
<div class="section">
<h2>Day2</h2>

<div class="card">
<h3>渦潮クルーズ</h3>
<p>迫力の鳴門海峡体験。</p>
<img src="uzushio.JPG">
</div>

<div class="card">
<h3>道の駅うずしおレストラン</h3>
<p>昼はがっつり淡路牛バーガー。</p>
<img src="ottamanegi.JPG">
</div>

</div>

<!-- 料金概算 -->
<div class="section">
<h2>料金概算（1人あたり目安）</h2>

<table>
<tr><th>項目</th><th>金額</th></tr>
<tr><td>高速・ガソリン</td><td>5,000円</td></tr>
<tr><td>渦潮クルーズ</td><td>2,500円</td></tr>
<tr><td>昼食（2回）</td><td>4,000円</td></tr>
<tr><td>夜ご飯</td><td>5,000円</td></tr>
<tr><td>カフェ・軽食</td><td>1,500円</td></tr>
<tr><td>その他お土産</td><td>3,000円</td></tr>
<tr class="total"><td>合計目安</td><td>約21,000円</td></tr>
</table>

</div>

</body>
</html>
