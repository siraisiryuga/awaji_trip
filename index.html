<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>淡路島旅行 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP", serif;
background:#f4f4f4;
color:#222;
}


/* ===== 表紙 ===== */

.hero{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
background:#000;
}

.hero img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center;
}


/* 中央配置オーバーレイ */

.hero-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
text-align:center;
color:white;
padding:40px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
border-radius:12px;
}


/* タイトル */

.hero-title{
font-family:"Playfair Display", serif;
font-size:48px;
letter-spacing:6px;
margin-bottom:20px;
line-height:1.4;
}


/* サブタイトル */

.hero-sub{
font-size:18px;
letter-spacing:3px;
opacity:0.9;
}


/* ===== コンテンツ ===== */

.section{
background:white;
margin:30px auto;
padding:30px;
width:90%;
max-width:700px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.section-title{
font-size:22px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:8px;
}

.schedule{
line-height:1.9;
}

.cost{
line-height:2;
}

.total{
font-size:22px;
margin-top:10px;
font-weight:500;
}

.footer{
text-align:center;
padding:40px;
color:#888;
font-size:14px;
}

</style>
</head>

<body>


<!-- 表紙 -->
<div class="hero">

<img src="IMG_1234.JPG">

<div class="hero-overlay">

<div class="hero-title">
AWAJI<br>
ISLAND
</div>

<div class="hero-sub">
SPRING TRIP 2026
</div>

</div>

</div>


<!-- 日程 -->
<div class="section">

<div class="section-title">
日程表
</div>

<div class="schedule">

<b>1日目</b><br>

09:00　出発<br>
12:30　淡路SA 到着<br>
13:30　渦潮クルーズ<br>
15:30　観光・カフェ<br>
18:30　チェックイン<br>
19:30　夕食<br>

<br>

<b>2日目</b><br>

09:00　起床<br>
10:30　観光<br>
12:00　道の駅うずしお 昼食<br>
14:00　出発<br>
18:00　帰宅<br>

</div>

</div>


<!-- 割り勘 -->
<div class="section">

<div class="section-title">
料金概算
</div>

<div class="cost">

宿泊　¥8,000<br>
レンタカー　¥5,000<br>
ガソリン　¥2,000<br>
高速　¥3,000<br>
食費　¥5,000<br>

<div class="total">
合計　¥23,000 / 人
</div>

</div>

</div>


<div class="footer">
Awaji Island Trip 2026
</div>


</body>
</html>
